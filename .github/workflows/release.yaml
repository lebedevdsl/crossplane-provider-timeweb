name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write  # required for cosign keyless signing

jobs:
  release:
    name: build + sign + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/main/install.sh | sh
          sudo mv crossplane /usr/local/bin/

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run code generation
        run: make generate

      # Embed model: the controller runtime is baked INTO the .xpkg, so there is
      # no separate controller image. `make release` builds the per-arch embedded
      # package(s), pushes them as one (multi-arch) index to ghcr, then
      # cosign-signs that package ref (keyless via the id-token below).
      # Provider.spec.package = ghcr.io/lebedevdsl/provider-timeweb:<tag>.
      - name: Build embedded package, push to ghcr, and cosign-sign
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          make release \
            IMAGE_REPO=ghcr.io/lebedevdsl/provider-timeweb \
            VERSION="${VERSION}"
