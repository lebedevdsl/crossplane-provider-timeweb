name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write  # required for cosign keyless signing

jobs:
  release:
    name: build + sign + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/main/install.sh | sh
          sudo mv crossplane /usr/local/bin/

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run code generation
        run: make generate

      - name: Build multi-arch image and push
        env:
          VERSION: ${{ github.ref_name }}
        run: make image

      - name: Sign image (cosign keyless)
        env:
          VERSION: ${{ github.ref_name }}
        run: cosign sign --yes ghcr.io/lebedevdsl/provider-timeweb:${VERSION}

      - name: Build Crossplane package
        env:
          VERSION: ${{ github.ref_name }}
        run: make xpkg.build

      - name: Push Crossplane package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          crossplane xpkg push \
            -f bin/provider-timeweb-${VERSION}.xpkg \
            ghcr.io/lebedevdsl/provider-timeweb:${VERSION}-xpkg
