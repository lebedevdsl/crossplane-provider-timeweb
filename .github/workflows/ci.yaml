name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  reviewable:
    name: lint + vuln + generate-clean + validate-examples + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Lint (golangci-lint built from source via go run)
        run: make lint

      - name: Vulnerability scan (govulncheck via go run)
        # Gating. NOTE: this can fail when a NEW advisory lands upstream even
        # without a code change here — that is the intended early-warning. If
        # that cadence becomes noisy, add `continue-on-error: true`.
        run: make vuln

      - name: Run code generation
        run: make generate

      - name: Verify clean tree (FR-008, SC-008)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree dirty after 'make generate'. Run 'make generate' locally and commit the result."
            git status --short
            git diff
            exit 1
          fi

      - name: Install crossplane CLI
        env:
          XP_VERSION: v2.1.3
        run: |
          curl -fsSL "https://releases.crossplane.io/stable/${XP_VERSION}/bin/linux_amd64/crank" -o /tmp/crossplane
          chmod +x /tmp/crossplane
          sudo mv /tmp/crossplane /usr/local/bin/crossplane
          crossplane --help >/dev/null && echo "crossplane CLI ${XP_VERSION} installed"

      - name: Validate examples against CRD schemas (crossplane beta validate)
        run: make validate-examples

      - name: Run unit tests
        run: go test -race -cover -coverprofile=cover.out ./...

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          if-no-files-found: warn
          retention-days: 7
