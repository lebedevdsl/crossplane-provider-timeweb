# Per-step assert timeout — Server provisioning takes longer than the suite-wide
# default (240s); 600s covers the upstream installing→starting→on transition
# (~10 min per spec SC-001 for the smallest preset).
#
# Conditions are checked with `kubectl wait --for=condition=<type>=<status>`
# (selects by condition TYPE) instead of a declarative `status.conditions:`
# block. kuttl matches the conditions ARRAY POSITIONALLY and there is no
# unordered/partial slice match (kudobuilder/kuttl#76), so a declarative block
# is fragile: a gating-ref Server lands [Synced, Ready] while non-gating kinds
# land [Ready, Synced], and the order even flips across create vs update — the
# recurring source of false failures in this suite. kubectl wait is
# order-independent. Stable scalar fields are still asserted declaratively below
# (maps, not slices → order does not apply).
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
commands:
  - command: kubectl wait --for=condition=Synced=True --timeout=590s -n timeweb-e2e sshkeys.sshkey.m.timeweb.crossplane.io/e2e-server-sshkey
  - command: kubectl wait --for=condition=Ready=True  --timeout=590s -n timeweb-e2e sshkeys.sshkey.m.timeweb.crossplane.io/e2e-server-sshkey
  - command: kubectl wait --for=condition=Synced=True --timeout=590s -n timeweb-e2e servers.compute.m.timeweb.crossplane.io/e2e-server
  - command: kubectl wait --for=condition=Ready=True  --timeout=590s -n timeweb-e2e servers.compute.m.timeweb.crossplane.io/e2e-server
---
# Stable-field declarative assert — the upstream VM is actually "on" (this is the
# field Ready is gated on, so it doubles as a sanity check on the wait above).
apiVersion: compute.m.timeweb.crossplane.io/v1alpha1
kind: Server
metadata:
  name: e2e-server
  namespace: timeweb-e2e
status:
  atProvider:
    state: "on"
