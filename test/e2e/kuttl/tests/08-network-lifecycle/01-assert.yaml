# VPC create is synchronous upstream, but allow generous headroom over the
# suite default for the catalog-free connect + create round-trip.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
---
# Network has no cross-resource reference, so its first reconcile reaches the
# Create path: Creating() sets Ready=False first, then ReconcileSuccess appends
# Synced. kuttl matches conditions positionally, so the order here is
# [Ready, Synced]. (Contrast: ref-having kinds — Server 09/10, Cluster-with-
# network 14, Router 18 — fail Connect first and emit [Synced, Ready]; the
# Observe-only Project 02 also emits [Synced, Ready].)
apiVersion: network.m.timeweb.crossplane.io/v1alpha1
kind: Network
metadata:
  name: e2e-network
  namespace: timeweb-e2e
status:
  conditions:
  - type: Ready
    status: "True"
  - type: Synced
    status: "True"
