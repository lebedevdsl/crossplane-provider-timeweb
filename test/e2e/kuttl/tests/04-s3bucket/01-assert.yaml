apiVersion: objectstorage.m.timeweb.crossplane.io/v1alpha1
kind: S3Bucket
metadata:
  name: e2e-s3
  namespace: timeweb-e2e
status:
  # kuttl matches arrays positionally. Full-lifecycle MRs (Observe sets
  # Available before the runtime appends Synced=True) end up with Ready
  # at index [0], Synced at [1]. Only Observe-only MRs (Project) end up
  # with the opposite order. See controller/registry_external_test.go
  # for the unit-level reference and 06-preset-not-found/01-assert.yaml
  # for a failure-path example of the same rule.
  conditions:
  - type: Ready
    status: "True"
  - type: Synced
    status: "True"
