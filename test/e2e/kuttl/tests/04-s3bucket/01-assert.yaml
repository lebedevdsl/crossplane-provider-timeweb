# Conditions are checked with `kubectl wait --for=condition=<type>=<status>`
# (selects by condition TYPE), NOT a declarative `status.conditions:` block:
# kuttl matches the conditions array POSITIONALLY (kudobuilder/kuttl#76), and the
# order is code-path-dependent (Ready/Synced index flips across kinds and across
# create vs update). kubectl wait is order-independent — the reliable form.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 240
commands:
  - command: kubectl wait --for=condition=Synced=True --timeout=230s -n timeweb-e2e s3buckets.objectstorage.m.timeweb.crossplane.io/e2e-s3
  - command: kubectl wait --for=condition=Ready=True  --timeout=230s -n timeweb-e2e s3buckets.objectstorage.m.timeweb.crossplane.io/e2e-s3
