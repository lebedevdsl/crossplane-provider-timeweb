# S3Bucket - full lifecycle via `initialSizeGB`. The controller maps
# (initialSizeGB, storageClass, location?) to one upstream preset_id at
# reconcile time. No preset slugs leak into the operator-facing spec.
#
# 10 GB tier: the account permits only ONE 1 GB bucket, so e2e buckets use 10 GB
# to avoid colliding with any pre-existing 1 GB bucket on the account.
apiVersion: objectstorage.m.timeweb.crossplane.io/v1alpha1
kind: S3Bucket
metadata:
  name: e2e-s3
  namespace: timeweb-e2e
spec:
  forProvider:
    name: "${TWE_S3_NAME}"
    type: private
    storageClass: hot
    initialSizeGB: 10
    description: "kuttl e2e - initialSizeGB variant"
  writeConnectionSecretToRef:
    name: e2e-s3-conn
  providerConfigRef:
    kind: ProviderConfig
    name: e2e
