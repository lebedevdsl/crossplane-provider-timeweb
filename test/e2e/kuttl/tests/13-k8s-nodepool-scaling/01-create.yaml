# Step 1 — create a cluster + worker pool at nodeCount 2 (feature 004 US2).
apiVersion: kubernetes.m.timeweb.crossplane.io/v1alpha1
kind: KubernetesCluster
metadata:
  name: e2e-k8s-scale
  namespace: timeweb-e2e
spec:
  providerConfigRef: { kind: ProviderConfig, name: e2e }
  writeConnectionSecretToRef: { name: e2e-k8s-scale-kubeconfig }
  forProvider:
    name: "${TWE_K8S_CLUSTER_NAME}-scale"
    k8sVersion: "${TWE_K8S_VERSION}"
    networkDriver: cilium
    availabilityZone: msk-1
    presetName: "${TWE_K8S_MASTER_PRESET}"
---
apiVersion: kubernetes.m.timeweb.crossplane.io/v1alpha1
kind: KubernetesClusterNodepool
metadata:
  name: e2e-k8s-scale-workers
  namespace: timeweb-e2e
spec:
  providerConfigRef: { kind: ProviderConfig, name: e2e }
  forProvider:
    name: workers
    clusterRef: { name: e2e-k8s-scale }
    presetName: "${TWE_K8S_WORKER_PRESET}"
    nodeCount: 2
