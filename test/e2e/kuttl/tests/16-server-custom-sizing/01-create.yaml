# Step 1 — Server custom configurator sizing (feature 005 US1).
# Sizes the server by cpu/ramGB/diskGB (no presetName); the controller resolves
# the configurator from /api/v1/configurator/servers. Sizing values are the
# cheapest ru-1 configurator's mins, discovered at runtime by the wrapper.
apiVersion: sshkey.m.timeweb.crossplane.io/v1alpha1
kind: SSHKey
metadata:
  name: e2e-srvcustom-sshkey
  namespace: timeweb-e2e
spec:
  forProvider:
    name: "${TWE_SSH_NAME}-custom"
    body: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHLCQkE7gXn28djFRYNLzC6abZghcgTFXQ3MrYRvx07s dlebedev@Dmitrys-MacBook-Pro.local"
    isDefault: false
  providerConfigRef: { kind: ProviderConfig, name: e2e }
---
apiVersion: compute.m.timeweb.crossplane.io/v1alpha1
kind: Server
metadata:
  name: e2e-srv-custom
  namespace: timeweb-e2e
spec:
  providerConfigRef: { kind: ProviderConfig, name: e2e }
  writeConnectionSecretToRef: { name: e2e-srv-custom-conn }
  forProvider:
    name: "${TWE_SERVER_NAME}-custom"
    # ru-3/msk-1: ru-1's configurator catalog exposes only promo/legacy
    # configurators (discount35/ssd_2022/spb_gpu/spb3_dedicated_cpu) that the
    # create endpoint refuses; ru-3 has a standard orderable configurator
    # (msk_nvme/msk_high_cpu). Verified live 2026-06-20.
    location: ru-3
    availabilityZone: msk-1
    os: { image: ubuntu, version: "24.04" }
    resources:
      cpu: ${TWE_SRV_CPU}
      ramGB: ${TWE_SRV_RAMGB}
      diskGB: ${TWE_SRV_DISKGB}
    sshKeyRefs:
    - name: e2e-srvcustom-sshkey
