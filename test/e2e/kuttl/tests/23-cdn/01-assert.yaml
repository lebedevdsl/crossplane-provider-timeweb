# Conditions checked with `kubectl wait --for=condition` (order-independent) —
# NOT a declarative status.conditions block (kuttl matches arrays positionally).
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 240
commands:
  - command: kubectl wait --for=condition=Synced=True --timeout=230s -n timeweb-e2e cdns.cdn.m.timeweb.crossplane.io/e2e-cdn
  - command: kubectl wait --for=condition=Ready=True  --timeout=230s -n timeweb-e2e cdns.cdn.m.timeweb.crossplane.io/e2e-cdn
  # The technical delivery domain is assigned at create.
  - script: test -n "$(kubectl get cdn -n timeweb-e2e e2e-cdn -o jsonpath='{.status.atProvider.technicalDomain}')"
