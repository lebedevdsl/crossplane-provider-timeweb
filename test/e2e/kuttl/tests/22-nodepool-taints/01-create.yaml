# Step 1 — cluster + a tainted, labelled worker pool (feature 015 US1).
# Taints ride the create body: nodes join already tainted.
apiVersion: kubernetes.m.timeweb.crossplane.io/v1alpha1
kind: KubernetesCluster
metadata:
  name: e2e-k8s-taints
  namespace: timeweb-e2e
spec:
  providerConfigRef: { kind: ProviderConfig, name: e2e }
  writeConnectionSecretToRef: { name: e2e-k8s-taints-kubeconfig }
  forProvider:
    name: "${TWE_K8S_CLUSTER_NAME}-taints"
    k8sVersion: "${TWE_K8S_VERSION}"
    networkDriver: cilium
    location: "${TWE_LOCATION}"
    availabilityZone: "${TWE_AZ}"
    presetName: "${TWE_K8S_MASTER_PRESET}"
---
apiVersion: kubernetes.m.timeweb.crossplane.io/v1alpha1
kind: KubernetesClusterNodepool
metadata:
  name: e2e-k8s-taints-workers
  namespace: timeweb-e2e
spec:
  providerConfigRef: { kind: ProviderConfig, name: e2e }
  forProvider:
    name: tainted-workers
    clusterRef: { name: e2e-k8s-taints }
    presetName: "${TWE_K8S_WORKER_PRESET}"
    nodeCount: 2
    labels:
      role: e2e-dedicated
    taints:
      - key: dedicated
        value: e2e
        effect: NoSchedule
      - key: e2e-probe
        effect: PreferNoSchedule   # value-less taint (nil ≡ "" upstream)
