# Conditions checked with `kubectl wait --for=condition` (order-independent) —
# NOT a declarative status.conditions block (kuttl matches arrays positionally).
# Synced+Ready on the nodepool implies metadata convergence: Observe set-diffs
# declared vs upstream-reported taints/labels, so a mismatch would hold the
# resource out of up-to-date.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 1800
commands:
  - command: kubectl wait --for=condition=Synced=True --timeout=1790s -n timeweb-e2e kubernetesclusters.kubernetes.m.timeweb.crossplane.io/e2e-k8s-taints
  - command: kubectl wait --for=condition=Ready=True  --timeout=1790s -n timeweb-e2e kubernetesclusters.kubernetes.m.timeweb.crossplane.io/e2e-k8s-taints
  - command: kubectl wait --for=condition=Synced=True --timeout=1790s -n timeweb-e2e kubernetesclusternodepools.kubernetes.m.timeweb.crossplane.io/e2e-k8s-taints-workers
  - command: kubectl wait --for=condition=Ready=True  --timeout=1790s -n timeweb-e2e kubernetesclusternodepools.kubernetes.m.timeweb.crossplane.io/e2e-k8s-taints-workers
  # Upstream evidence: the group object reports the declared taint. Skipped on
  # hosts that cannot reach api.timeweb.cloud (TWE_NO_API_SWEEP=1, same switch
  # as the orphan sweep).
  - script: |
      set -e
      [ "${TWE_NO_API_SWEEP:-0}" = "1" ] && { echo "skip: host API check disabled"; exit 0; }
      CID=$(kubectl get kubernetesclusters.kubernetes.m.timeweb.crossplane.io -n timeweb-e2e e2e-k8s-taints -o jsonpath='{.metadata.annotations.crossplane\.io/external-name}')
      GID=$(kubectl get kubernetesclusternodepools.kubernetes.m.timeweb.crossplane.io -n timeweb-e2e e2e-k8s-taints-workers -o jsonpath='{.metadata.annotations.crossplane\.io/external-name}')
      curl -sf -H "Authorization: Bearer ${TIMEWEB_CLOUD_TOKEN}" \
        "https://api.timeweb.cloud/api/v1/k8s/clusters/${CID}/groups/${GID}" \
        | grep -q '"key": *"dedicated"\|"key":"dedicated"'
