# Convergence: observedNodeCount reflects the scale-up AND the upstream group
# reports the UPDATED taint set (old value gone) — persistence across a node
# add rides the same group config (US2).
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 900
commands:
  - command: kubectl wait --for=condition=Synced=True --timeout=890s -n timeweb-e2e kubernetesclusternodepools.kubernetes.m.timeweb.crossplane.io/e2e-k8s-taints-workers
  - command: kubectl wait --for=condition=Ready=True  --timeout=890s -n timeweb-e2e kubernetesclusternodepools.kubernetes.m.timeweb.crossplane.io/e2e-k8s-taints-workers
  - script: |
      set -e
      [ "${TWE_NO_API_SWEEP:-0}" = "1" ] && { echo "skip: host API check disabled"; exit 0; }
      CID=$(kubectl get kubernetesclusters.kubernetes.m.timeweb.crossplane.io -n timeweb-e2e e2e-k8s-taints -o jsonpath='{.metadata.annotations.crossplane\.io/external-name}')
      GID=$(kubectl get kubernetesclusternodepools.kubernetes.m.timeweb.crossplane.io -n timeweb-e2e e2e-k8s-taints-workers -o jsonpath='{.metadata.annotations.crossplane\.io/external-name}')
      for i in $(seq 1 30); do
        BODY=$(curl -sf -H "Authorization: Bearer ${TIMEWEB_CLOUD_TOKEN}" \
          "https://api.timeweb.cloud/api/v1/k8s/clusters/${CID}/groups/${GID}")
        echo "$BODY" | grep -q 'e2e-updated' && ! echo "$BODY" | grep -q 'e2e-probe' && exit 0
        sleep 10
      done
      echo "upstream taints did not converge to the edited set"; exit 1
---
apiVersion: kubernetes.m.timeweb.crossplane.io/v1alpha1
kind: KubernetesClusterNodepool
metadata:
  name: e2e-k8s-taints-workers
  namespace: timeweb-e2e
status:
  atProvider:
    observedNodeCount: 3
