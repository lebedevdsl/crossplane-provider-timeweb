# Test Project manifest applied by the e2e bundle.
#
# This manifest IMPORTS an existing Timeweb project (id 2277851) and runs
# the controller in OBSERVE-ONLY mode. Rationale: the e2e token typically
# has read access to project metadata but cannot mutate it (`POST/PATCH
# /api/v1/projects[/{id}]` returns 403). Restricting managementPolicies to
# [Observe] avoids exercising the Update/Create/Delete paths — which would
# fail with 403 in this account scope — while still proving that the
# controller can Observe an upstream project and produce a Ready=True CR.
#
# When the CR is removed via `kubectl delete`, the upstream project is
# preserved (no Delete in the policy list).
#
# The literal __E2E_NAMESPACE__ is substituted by verify.sh at apply time.
apiVersion: project.m.timeweb.crossplane.io/v1alpha1
kind: Project
metadata:
  name: e2e-project
  namespace: __E2E_NAMESPACE__
  annotations:
    # Adopt the existing Timeweb project rather than creating a new one.
    crossplane.io/external-name: "2277851"
spec:
  forProvider:
    # Values here are NOT propagated upstream while managementPolicies
    # excludes Update. They exist only to satisfy the CRD schema (`name`
    # is required) and to document operator intent. If the token gains
    # write permission later, add `Update` to the policies and these
    # values become the desired state.
    name: "(observed by e2e — not modified)"
    description: "Read-only import from the provider-timeweb e2e bundle."
  managementPolicies:
    - Observe
  providerConfigRef:
    name: e2e
