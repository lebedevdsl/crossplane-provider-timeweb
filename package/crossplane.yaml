apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-timeweb
  annotations:
    meta.crossplane.io/maintainer: "Dmitry Lebedev <lebedevdsl@gmail.com>"
    meta.crossplane.io/source: "github.com/lebedevdsl/crossplane-provider-timeweb"
    meta.crossplane.io/license: "Apache-2.0"
    meta.crossplane.io/description: |
      Crossplane v2 provider for Timeweb Cloud — a native, hand-written
      controller (no Upjet / no Terraform-provider lineage). Managed
      resources: namespaced ProviderConfig + cluster-scoped
      ClusterProviderConfig (with the dual-reference fallback documented
      in the README), Project, SshKey, S3Bucket, ContainerRegistry,
      ContainerRegistryRepository, Server (cloud VM, compute group),
      Network (VPC) and FloatingIP (floating IPv4) in the network group,
      and KubernetesCluster + KubernetesClusterNodepool +
      KubernetesClusterAddon in the kubernetes group (managed K8s — preset-
      sized control plane, scalable worker pools, kubeconfig connection
      Secret, in-place version upgrade). Sizing on the two storage-class
      MRs (S3Bucket, ContainerRegistry) is via `initialSizeGB` with a
      CEL-enforced enum tied to Timeweb's published tariff tiers; the
      Server and the K8s cluster/nodepool are sized via a `presetName` slug
      resolved by the in-controller catalog resolver. Floating-IP
      bind/unbind is owned by the Server (Server-consumes-IP).
    meta.crossplane.io/readme: |
      See the top-level README.md, docs/presets.md (storage sizing),
      docs/servers.md (Server / Network / FloatingIP) and
      docs/kubernetes.md (managed Kubernetes) for the operator walkthrough.
spec:
  controller:
    image: ghcr.io/lebedevdsl/provider-timeweb:v0.1.0
  crossplane:
    # Provider targets Crossplane v2 from day one (namespaced managed
    # resources, v2-only `pkg.crossplane.io/v1` Provider install model).
    version: ">=v2.0.0-0"
