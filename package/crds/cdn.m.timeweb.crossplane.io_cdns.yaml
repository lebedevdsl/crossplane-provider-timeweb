---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: cdns.cdn.m.timeweb.crossplane.io
spec:
  group: cdn.m.timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - timeweb
    kind: Cdn
    listKind: CdnList
    plural: cdns
    singular: cdn
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .status.atProvider.technicalDomain
      name: DOMAIN
      type: string
    - jsonPath: .status.atProvider.state
      name: STATE
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: ID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Cdn is a Timeweb Cloud CDN resource: one origin (S3 bucket by reference,
          domain, or IP) served through an auto-assigned technical delivery domain,
          with the declared settings blocks kept in sync (single-writer). The
          `cdn.timeweb.crossplane.io/purge` annotation triggers a one-shot cache
          purge. See specs/016-cdn-resource/contracts/timeweb-cdn-endpoints.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CdnSpec is the desired state.
            properties:
              forProvider:
                description: |-
                  CdnParameters is the operator-settable surface for a Timeweb CDN resource.
                  Settings blocks left nil are NOT owned: the controller never writes them
                  upstream and only mirrors them read-only in status (FR-010). See
                  specs/016-cdn-resource/contracts/cdn-v1alpha1.md.
                properties:
                  cache:
                    description: Cache configures CDN and browser caching.
                    properties:
                      alwaysOnline:
                        description: AlwaysOnline serves stale cached content when
                          the origin is down.
                        type: boolean
                      browserTTLSeconds:
                        description: |-
                          BrowserTTLSeconds sets the Cache-Control browser TTL. 0 or absent
                          disables browser caching.
                        format: int64
                        minimum: 0
                        type: integer
                      edgeTTLSeconds:
                        description: |-
                          EdgeTTLSeconds is how long content stays cached on CDN nodes. 0 or
                          absent disables CDN caching.
                        format: int64
                        minimum: 0
                        type: integer
                      queryStringCacheKeyMode:
                        description: |-
                          QueryStringCacheKeyMode selects how query parameters join the cache
                          key: all = every parameter (the panel's "Все" mode); whitelist = only
                          queryStringCacheKeyParams; blacklist = every parameter except
                          queryStringCacheKeyParams (panel-verified wire: `query_args: {mode, list}`).
                        enum:
                        - all
                        - whitelist
                        - blacklist
                        type: string
                      queryStringCacheKeyParams:
                        description: |-
                          QueryStringCacheKeyParams is the parameter list for whitelist /
                          blacklist mode (e.g. ["utm_source","ref","v"]).
                        items:
                          type: string
                        maxItems: 32
                        type: array
                    type: object
                    x-kubernetes-validations:
                    - message: queryStringCacheKeyParams requires queryStringCacheKeyMode
                        whitelist or blacklist
                      rule: '!has(self.queryStringCacheKeyParams) || (has(self.queryStringCacheKeyMode)
                        && self.queryStringCacheKeyMode != ''all'')'
                    - message: whitelist/blacklist mode requires queryStringCacheKeyParams
                      rule: '!has(self.queryStringCacheKeyMode) || self.queryStringCacheKeyMode
                        == ''all'' || has(self.queryStringCacheKeyParams)'
                  cors:
                    description: Cors configures Access-Control-Allow-Origin handling.
                    properties:
                      alwaysAddHeader:
                        description: |-
                          AlwaysAddHeader adds the CORS header to every response, not only
                          successful ones.
                        type: boolean
                      origins:
                        description: |-
                          Origins lists allowed origins: exact ("example.com"), wildcard
                          subdomains ("*.example.com"), a domain with all subdomains
                          (".example.com"), or an upstream-supported regex ("~a\\d+\\.example\\.com").
                        items:
                          type: string
                        maxItems: 16
                        minItems: 1
                        type: array
                        x-kubernetes-list-type: set
                    required:
                    - origins
                    type: object
                  description:
                    description: Description is an optional free-form comment. Mutable.
                    maxLength: 255
                    type: string
                  domains:
                    description: |-
                      Domains are custom delivery subdomains (CNAME → the technical domain is
                      the operator's DNS task). The technical domain is always present and
                      never touched. Omitted = alias set unowned.
                    items:
                      type: string
                    maxItems: 2
                    type: array
                    x-kubernetes-list-type: set
                  name:
                    description: |-
                      Name is the resource name shown in the dashboard. Defaults to the MR
                      name. Mutable.
                    maxLength: 255
                    minLength: 1
                    type: string
                  origin:
                    description: |-
                      Origin is the content source. The origin kind (bucketRef/domain/ip)
                      selects the upstream wiring: bucket origins attach by storage id and
                      get AWS auth automatically; domain/ip origins are plain servers.
                    properties:
                      awsAuthSecretRef:
                        description: |-
                          AWSAuthSecretRef enables AWS-signature auth against an EXTERNAL private
                          S3-compatible origin (Secret keys: access_key, secret_key). Forbidden
                          with bucketRef — in-account buckets are wired upstream automatically.
                        properties:
                          key:
                            description: Key within the Secret, where a single value
                              is needed.
                            type: string
                          name:
                            description: Name of the Secret.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      bucketRef:
                        description: |-
                          BucketRef points at an S3Bucket managed by this provider (same
                          namespace). The bucket must be Ready before the CDN is created.
                        properties:
                          name:
                            description: Name of the referenced S3Bucket.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      domain:
                        description: Domain is an external origin hostname (no scheme,
                          no path).
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([a-z0-9\-\.]*[a-z0-9])?$
                        type: string
                      https:
                        default: true
                        description: HTTPS selects the origin scheme (`use_https`).
                          Defaults to true.
                        type: boolean
                      ip:
                        description: IP is an external origin IPv4 address.
                        pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                        type: string
                      port:
                        description: |-
                          Port overrides the origin port for domain/ip origins. Defaults by
                          scheme (443 for https, 80 for http).
                        format: int64
                        maximum: 65535
                        minimum: 1
                        type: integer
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of bucketRef, domain, or ip must be set
                      rule: '(has(self.bucketRef) ? 1 : 0) + (has(self.domain) ? 1
                        : 0) + (has(self.ip) ? 1 : 0) == 1'
                    - message: port applies to domain/ip origins only
                      rule: '!(has(self.bucketRef) && has(self.port))'
                    - message: awsAuthSecretRef applies to external origins only (in-account
                        buckets auto-wire)
                      rule: '!(has(self.bucketRef) && has(self.awsAuthSecretRef))'
                  performance:
                    description: Performance configures delivery optimizations and
