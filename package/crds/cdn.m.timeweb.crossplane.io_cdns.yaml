                      budgetKey:
                        description: |-
                          BudgetKey fingerprints the domains+ssl declaration; a change resets the
                          retry budget.
                        type: string
                      issueAttempts:
                        format: int64
                        type: integer
                      lastIssueAttemptAt:
                        format: date-time
                        type: string
                      state:
                        description: 'State: pending | issuing | bound | failed |
                          exhausted.'
                        type: string
                    type: object
                  state:
                    description: State is the upstream lifecycle status (e.g. "processing").
                    type: string
                  technicalDomain:
                    description: |-
                      TechnicalDomain is the auto-assigned delivery domain
                      (`*.cdn.twcstorage.ru`).
                    type: string
                  trafficLimitBytes:
                    description: TrafficLimitBytes mirrors the upstream outbound-traffic
                      cap.
                    format: int64
                    type: integer
                  trafficUsage:
                    description: TrafficUsage mirrors the upstream traffic counters.
                    properties:
                      cacheRatio:
                        description: |-
                          CacheRatio is the upstream cache-hit ratio, formatted as a string
                          (CRD schemas disallow floats).
                        type: string
                      outgoingTrafficBytes:
                        format: int64
                        type: integer
                      requests:
                        format: int64
                        type: integer
                    type: object
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
