                        - "off"
                        - video
                        - images
                        type: string
                      gzip:
                        description: Gzip enables CDN-side text compression.
                        type: boolean
                      http3:
                        description: HTTP3 enables the HTTP/3 protocol on delivery.
                        type: boolean
                      largeFileSlicingMB:
                        description: |-
                          LargeFileSlicingMB enables large-file segmentation with the given
                          block size. Absent disables slicing.
                        format: int64
                        maximum: 1024
                        minimum: 1
                        type: integer
                      robots:
                        description: Robots configures search-engine indexing via
                          robots.txt.
                        properties:
                          custom:
                            description: Custom is the inline robots.txt body for
                              mode=custom.
                            maxLength: 4096
                            type: string
                          mode:
                            default: deny
                            description: |-
                              Mode: deny = do not index (default), proxy = pass the origin's
                              robots.txt through, custom = serve the inline `custom` directives.
                            enum:
                            - deny
                            - proxy
                            - custom
                            type: string
                        required:
                        - mode
                        type: object
                        x-kubernetes-validations:
                        - message: custom content is required exactly when mode is
                            'custom'
                          rule: (has(self.custom) && self.mode == 'custom') || (!has(self.custom)
                            && self.mode != 'custom')
                    type: object
                  projectID:
                    description: ProjectID assigns the CDN resource to a Timeweb project.
                    type: integer
                  requestHeaders:
                    description: |-
                      RequestHeaders are custom headers the CDN adds to origin requests.
                      Header names must be unique.

                      MaxItems bounds the array per the apiserver CEL cost budget
                      (project_cel_cost_budget_crd).
                    items:
                      description: CdnRequestHeader is one custom header the CDN sends
                        to the origin.
                      properties:
                        name:
                          description: Name is the HTTP header name.
                          maxLength: 128
                          minLength: 1
                          pattern: ^[A-Za-z0-9][A-Za-z0-9\-_]*$
                          type: string
                        value:
                          description: Value is the header value sent verbatim to
                            the origin.
                          maxLength: 1024
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    maxItems: 32
                    type: array
                    x-kubernetes-validations:
                    - message: requestHeaders names must be unique
                      rule: self.all(h, self.filter(o, o.name == h.name).size() ==
                        1)
                  security:
                    description: Security configures the HTTP→HTTPS redirect.
                    properties:
                      forceHTTPS:
                        description: ForceHTTPS redirects all HTTP requests on delivery
                          domains to HTTPS.
                        type: boolean
                      secureToken:
                        description: |-
                          SecureToken enables signed-URL access (see docs/cdn.md for the signing
                          algorithm). Omitted while the security block is declared = disabled.
                        properties:
                          restrictByIP:
                            description: RestrictByIP binds signatures to the client
                              IP.
                            type: boolean
                          secretRef:
                            description: SecretRef holds the signing key (Secret key
                              name defaults to "secret").
                            properties:
                              key:
                                description: Key within the Secret, where a single
                                  value is needed.
                                type: string
                              name:
                                description: Name of the Secret.
                                minLength: 1
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - secretRef
                        type: object
                    type: object
                  ssl:
                    description: SSL manages the resource's single certificate slot.
                      See CdnSSL.
                    properties:
                      certificateSecretRef:
                        description: |-
                          CertificateSecretRef points at a kubernetes.io/tls Secret
                          (tls.crt = full PEM chain, tls.key = private key).
                        properties:
                          key:
                            description: Key within the Secret, where a single value
                              is needed.
                            type: string
                          name:
                            description: Name of the Secret.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      mode:
                        description: |-
                          Mode: none = unbind and delete the provider-created certificate;
                          letsEncrypt = issue automatically (UNVERIFIED upstream — see docs);
                          custom = upload from certificateSecretRef.
                        enum:
                        - none
                        - letsEncrypt
                        - custom
                        type: string
                    required:
                    - mode
                    type: object
                    x-kubernetes-validations:
                    - message: certificateSecretRef is required for mode custom and
                        forbidden otherwise
                      rule: (self.mode == 'custom') == has(self.certificateSecretRef)
                  trafficLimitGBPerMonth:
                    description: |-
                      TrafficLimitGBPerMonth caps monthly outbound traffic (GiB multiples
                      upstream). 0 = explicitly no limit (clears an existing one); omitted =
                      unowned. Exceeding the cap suspends the resource upstream (up to 2 h
                      lag, traffic still billed meanwhile).
                    format: int64
                    minimum: 0
                    type: integer
                required:
                - origin
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: CdnStatus is the observed state.
            properties:
              atProvider:
                description: CdnObservation is the observed state of a Timeweb CDN
                  resource.
                properties:
                  certificate:
                    description: Certificate mirrors the upstream certificate bound
                      or present.
                    properties:
                      cn:
                        type: string
                      domains:
                        items:
                          type: string
                        maxItems: 16
                        type: array
                      expiresAt:
                        type: string
                      id:
                        format: int64
                        type: integer
                      issuedAt:
                        type: string
                      type:
                        type: string
                    type: object
                  domains:
                    description: |-
                      Domains mirrors the upstream delivery-domain aliases (includes the
                      technical domain; read-only — custom domains are out of v1 scope).
                    items:
                      type: string
                    maxItems: 8
                    type: array
                  id:
                    description: ID is the upstream resource id (also encoded as external-name).
                    format: int64
                    type: integer
                  lastPurgedAt:
                    description: |-
                      LastPurgedAt is when the last annotation-triggered cache purge
                      succeeded upstream.
                    format: date-time
                    type: string
                  lockedPresetID:
                    description: LockedPresetID is the CDN preset chosen at Create.
                    format: int64
                    type: integer
                  managedCertificate:
                    description: |-
                      ManagedCertificate marks the certificate the PROVIDER created — mode
                      none / rotation / deletion only ever delete a cert whose id AND
                      identity (type, cn, expiry) both match this marker. Upstream reuses
                      certificate ids (live-verified), so a bare id is not a safe owner mark.
                    properties:
                      cn:
                        type: string
                      domains:
                        items:
                          type: string
                        maxItems: 16
                        type: array
                      expiresAt:
                        type: string
                      id:
                        format: int64
                        type: integer
                      issuedAt:
                        type: string
                      type:
                        type: string
                    type: object
                  observedSettings:
                    description: ObservedSettings mirrors the upstream configuration
                      read-only.
                    properties:
                      cache:
                        description: |-
                          CdnCache is the caching settings block. When declared, the controller owns
                          every field in it (absent leaves mean "disabled").
                        properties:
                          alwaysOnline:
                            description: AlwaysOnline serves stale cached content
                              when the origin is down.
                            type: boolean
                          browserTTLSeconds:
                            description: |-
                              BrowserTTLSeconds sets the Cache-Control browser TTL. 0 or absent
                              disables browser caching.
                            format: int64
                            minimum: 0
                            type: integer
                          edgeTTLSeconds:
                            description: |-
                              EdgeTTLSeconds is how long content stays cached on CDN nodes. 0 or
                              absent disables CDN caching.
                            format: int64
                            minimum: 0
                            type: integer
                          queryStringCacheKeyMode:
                            description: |-
                              QueryStringCacheKeyMode selects how query parameters join the cache
                              key: all = every parameter (the panel's "Все" mode); whitelist = only
                              queryStringCacheKeyParams; blacklist = every parameter except
                              queryStringCacheKeyParams (panel-verified wire: `query_args: {mode, list}`).
                            enum:
                            - all
                            - whitelist
                            - blacklist
                            type: string
                          queryStringCacheKeyParams:
                            description: |-
                              QueryStringCacheKeyParams is the parameter list for whitelist /
                              blacklist mode (e.g. ["utm_source","ref","v"]).
                            items:
                              type: string
                            maxItems: 32
                            type: array
                        type: object
                        x-kubernetes-validations:
                        - message: queryStringCacheKeyParams requires queryStringCacheKeyMode
                            whitelist or blacklist
                          rule: '!has(self.queryStringCacheKeyParams) || (has(self.queryStringCacheKeyMode)
                            && self.queryStringCacheKeyMode != ''all'')'
                        - message: whitelist/blacklist mode requires queryStringCacheKeyParams
                          rule: '!has(self.queryStringCacheKeyMode) || self.queryStringCacheKeyMode
                            == ''all'' || has(self.queryStringCacheKeyParams)'
                      cors:
                        description: CdnCors is the CORS settings block (`Access-Control-Allow-Origin`).
                        properties:
                          alwaysAddHeader:
                            description: |-
                              AlwaysAddHeader adds the CORS header to every response, not only
                              successful ones.
                            type: boolean
                          origins:
                            description: |-
                              Origins lists allowed origins: exact ("example.com"), wildcard
                              subdomains ("*.example.com"), a domain with all subdomains
                              (".example.com"), or an upstream-supported regex ("~a\\d+\\.example\\.com").
                            items:
                              type: string
                            maxItems: 16
                            minItems: 1
                            type: array
                            x-kubernetes-list-type: set
                        required:
                        - origins
                        type: object
                      performance:
                        description: CdnPerformance is the delivery/performance settings
                          block.
                        properties:
                          contentOptimization:
                            default: "off"
                            description: |-
                              ContentOptimization processes content by type: video packages into
                              streaming formats, images optimizes them (panel-verified setting;
                              quote "off" in YAML — bare off parses as boolean).
                            enum:
                            - "off"
                            - video
                            - images
                            type: string
                          gzip:
                            description: Gzip enables CDN-side text compression.
                            type: boolean
                          http3:
                            description: HTTP3 enables the HTTP/3 protocol on delivery.
                            type: boolean
                          largeFileSlicingMB:
                            description: |-
                              LargeFileSlicingMB enables large-file segmentation with the given
                              block size. Absent disables slicing.
                            format: int64
                            maximum: 1024
                            minimum: 1
                            type: integer
                          robots:
                            description: Robots configures search-engine indexing
                              via robots.txt.
                            properties:
                              custom:
                                description: Custom is the inline robots.txt body
                                  for mode=custom.
                                maxLength: 4096
                                type: string
                              mode:
                                default: deny
                                description: |-
                                  Mode: deny = do not index (default), proxy = pass the origin's
                                  robots.txt through, custom = serve the inline `custom` directives.
                                enum:
                                - deny
                                - proxy
                                - custom
                                type: string
                            required:
                            - mode
                            type: object
                            x-kubernetes-validations:
                            - message: custom content is required exactly when mode
                                is 'custom'
                              rule: (has(self.custom) && self.mode == 'custom') ||
                                (!has(self.custom) && self.mode != 'custom')
                        type: object
                      requestHeaderNames:
                        description: RequestHeaderNames lists the names of headers
                          configured upstream.
                        items:
                          type: string
                        type: array
                      security:
                        description: |-
                          CdnSecurity is the security settings block. The certificate slot is
                          managed by spec.forProvider.ssl (not here); writes are per-key partial.
                        properties:
                          forceHTTPS:
                            description: ForceHTTPS redirects all HTTP requests on
                              delivery domains to HTTPS.
                            type: boolean
                          secureToken:
                            description: |-
                              SecureToken enables signed-URL access (see docs/cdn.md for the signing
                              algorithm). Omitted while the security block is declared = disabled.
                            properties:
                              restrictByIP:
                                description: RestrictByIP binds signatures to the
                                  client IP.
                                type: boolean
                              secretRef:
                                description: SecretRef holds the signing key (Secret
                                  key name defaults to "secret").
                                properties:
                                  key:
                                    description: Key within the Secret, where a single
                                      value is needed.
                                    type: string
                                  name:
                                    description: Name of the Secret.
                                    minLength: 1
                                    type: string
                                required:
                                - name
                                type: object
                            required:
                            - secretRef
                            type: object
                        type: object
                    type: object
                  source:
                    description: Source is the upstream-reported origin (bucket name
                      or host).
                    type: string
                  ssl:
                    description: SSL is the certificate-lifecycle state + LE retry
