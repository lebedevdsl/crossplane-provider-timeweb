---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: routers.network.m.timeweb.crossplane.io
spec:
  group: network.m.timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - timeweb
    kind: Router
    listKind: RouterList
    plural: routers
    singular: router
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .spec.forProvider.location
      name: LOCATION
      type: string
    - jsonPath: .spec.forProvider.presetName
      name: PRESET
      type: string
    - jsonPath: .status.atProvider.state
      name: STATE
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: ID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Router is Timeweb's NAT/DHCP router appliance for private networks. The
          upstream API is undocumented; every shape used here was probe-verified —
          see specs/006-router-private-cluster/contracts/timeweb-router-endpoints.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RouterSpec is the desired state.
            properties:
              forProvider:
                description: |-
                  RouterParameters is the operator-settable surface for a Timeweb Router.
                  See specs/006-router-private-cluster/contracts/router-v1alpha1.md.
                properties:
                  availabilityZone:
                    description: |-
                      AvailabilityZone pins the router to a specific AZ within the region.
                      Optional: when omitted the controller derives it automatically for
                      single-AZ regions (e.g. ru-3 → msk-1); for multi-AZ regions (ru-1)
                      it must be set explicitly. Zone membership is validated against the
                      live location catalog in the controller (not at admission). Immutable
                      post-create.
                    type: string
                    x-kubernetes-validations:
                    - message: availabilityZone is immutable
                      rule: self == oldSelf
                  comment:
                    description: Comment is a free-form note. Mutable.
                    type: string
                  location:
                    description: |-
                      Location is the Timeweb region code the router is placed in. Required
                      and immutable post-create. Valid values: ru-1 (St. Petersburg), ru-2
                      (Novosibirsk), ru-3 (Moscow), nl-1 (Amsterdam), de-1 (Frankfurt),
                      kz-1 (Almaty), us-4 (USA), pl-1 (Poland). Use the API code (e.g.
                      "ru-3"), not the dashboard label (e.g. "MSK-1").
                    enum:
                    - ru-1
                    - ru-2
                    - ru-3
                    - nl-1
                    - de-1
                    - kz-1
                    - us-4
                    - pl-1
                    type: string
                    x-kubernetes-validations:
                    - message: location is immutable
                      rule: self == oldSelf
                  name:
                    description: Name is the router name shown in the Timeweb dashboard.
                      Mutable.
                    maxLength: 250
                    minLength: 1
                    type: string
                  networks:
                    description: |-
                      Networks declares the attached private networks. The upstream
                      requires a router to ALWAYS have at least one network (enforced both
                      at create and at last-detach). Order-insensitive set semantics:
                      entries are attached/detached/toggled in place on a live router.

                      MaxItems bounds the number of DECLARED entries (not the networks a
                      selector resolves to at runtime — a single networkSelector entry still
                      matches an unbounded set, per FR-014). The bound is required so the
                      per-entry CEL rules (which call size() on the selector's matchLabels /
                      matchExpressions) stay within the apiserver's CEL cost budget.
                    items:
                      description: |-
                        RouterNetworkAttachment is one private network (or, via networkSelector, a
                        set of private networks) attached to the Router.
                      properties:
                        dhcp:
                          description: |-
                            DHCP serves addresses on this network (upstream is_dhcp_enabled,
                            converged per attachment on a live router).
                          type: boolean
                        gateway:
                          description: |-
                            Gateway optionally pins the gateway address inside the network's
                            subnet. Create-only in v1: drift is ignored by design (no transition
                            enforcement — list items keyed by network ref can't be tracked by
                            oldSelf rules).
                          type: string
                        natFloatingIP:
                          description: |-
                            NATFloatingIP enables internet egress for this network through the
                            referenced floating IP. Absent = NAT off. The explicit per-attachment
                            reference makes the IP↔network mapping declarative (one address serves
                            one network) and is itself the admission guarantee: NAT cannot be
                            declared without an address — the upstream would silently leave NAT
                            off in that case (probe-verified). The Router never orders addresses.
                          properties:
                            ip:
                              description: |-
                                IP is a raw public address of an existing floating IP (escape hatch
                                for addresses not modeled as FloatingIP resources).
                              type: string
                            ref:
                              description: Ref names a FloatingIP resource in the
                                same namespace.
                              properties:
                                name:
                                  description: Name of the referenced object.
                                  type: string
                                policy:
                                  description: Policies for referencing.
                                  properties:
                                    resolution:
                                      default: Required
                                      description: |-
                                        Resolution specifies whether resolution of this reference is required.
                                        The default is 'Required', which means the reconcile will fail if the
                                        reference cannot be resolved. 'Optional' means this reference will be
                                        a no-op if it cannot be resolved.
                                      enum:
                                      - Required
                                      - Optional
                                      type: string
                                    resolve:
                                      description: |-
                                        Resolve specifies when this reference should be resolved. The default
                                        is 'IfNotPresent', which will attempt to resolve the reference only when
                                        the corresponding field is not present. Use 'Always' to resolve the
                                        reference on every reconcile.
                                      enum:
                                      - Always
                                      - IfNotPresent
                                      type: string
                                  type: object
                              required:
                              - name
                              type: object
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of ref or ip must be set
                            rule: '(has(self.ref) ? 1 : 0) + (has(self.ip) ? 1 : 0)
                              == 1'
                        networkID:
                          description: |-
                            NetworkID is the raw upstream network id (network-<hex>) for a single
                            network not modeled as a Network resource.
                          type: string
                        networkRef:
                          description: NetworkRef names a single Network resource
                            in the same namespace.
                          properties:
                            name:
                              description: Name of the referenced object.
                              type: string
                            policy:
                              description: Policies for referencing.
                              properties:
                                resolution:
                                  default: Required
                                  description: |-
                                    Resolution specifies whether resolution of this reference is required.
                                    The default is 'Required', which means the reconcile will fail if the
                                    reference cannot be resolved. 'Optional' means this reference will be
                                    a no-op if it cannot be resolved.
                                  enum:
                                  - Required
                                  - Optional
                                  type: string
                                resolve:
                                  description: |-
                                    Resolve specifies when this reference should be resolved. The default
                                    is 'IfNotPresent', which will attempt to resolve the reference only when
                                    the corresponding field is not present. Use 'Always' to resolve the
                                    reference on every reconcile.
                                  enum:
                                  - Always
                                  - IfNotPresent
                                  type: string
                              type: object
                          required:
                          - name
                          type: object
                        networkSelector:
                          description: |-
                            NetworkSelector attaches EVERY Ready Network in the Router's namespace
                            whose labels match (to-many expansion). The attached set converges
                            continuously as networks are created, (un)labeled, or deleted. It must
                            constrain at least one label (an empty/match-all selector is rejected at
                            admission) and cannot be combined with natFloatingIP — one floating IP
                            cannot serve a changing set of networks. The DHCP / Gateway /
                            ReservedIPs on this entry become the defaults for every network the
                            selector brings in.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                        reservedIPs:
                          description: |-
                            ReservedIPs optionally reserves addresses in the network's subnet.
                            Create-only in v1 (same caveat as Gateway).
                          items:
                            type: string
                          type: array
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one of networkRef, networkID, or networkSelector
                          must be set
                        rule: '(has(self.networkRef) ? 1 : 0) + (has(self.networkID)
                          ? 1 : 0) + (has(self.networkSelector) ? 1 : 0) == 1'
                      - message: networkSelector must specify at least one matchLabels
                          entry or matchExpressions term (a match-all selector is
                          rejected)
                        rule: '!has(self.networkSelector) || (has(self.networkSelector.matchLabels)
                          && size(self.networkSelector.matchLabels) > 0) || (has(self.networkSelector.matchExpressions)
                          && size(self.networkSelector.matchExpressions) > 0)'
                      - message: natFloatingIP cannot be combined with networkSelector;
                          use networkRef/networkID for NAT'd networks
                        rule: '!(has(self.networkSelector) && has(self.natFloatingIP))'
                    maxItems: 64
                    minItems: 1
                    type: array
                  presetName:
                    description: "PresetName selects the size tier by slug, resolved
                      against the live\nper-region tier catalog. Slug shape:\n\n\trouter-<nodes>x<cpu>-<ramGB>gb-<location>
                      \  e.g. router-1x1-1gb-ru-3\n\n(2-node tiers are the HA flavors;
                      the `-<id>` disambiguator suffix is\naccepted as on other kinds.)
                      Editing the tier on a live Router is\nrejected until the upstream
                      resize operation is wired (FR-002a\nfallback) — the field is
                      schema-mutable for that future path."
                    minLength: 1
                    type: string
                  projectID:
                    format: int64
                    type: integer
                  projectRef:
                    description: |-
                      ProjectRef / ProjectID assign the router to a Timeweb project —
                      standard trio (ref takes effect when ProjectID is unset).
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                required:
                - location
                - name
                - networks
                - presetName
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: RouterStatus is the observed state.
            properties:
              atProvider:
                description: RouterObservation is the observed state.
                properties:
                  ips:
                    description: IPs are the router's public addresses and what each
                      one NATs.
                    items:
                      description: RouterIPStatus is one public address of the router.
                      properties:
                        ip:
                          description: IP is the public address.
                          type: string
                        natNetwork:
                          description: NATNetwork is the id of the network this address
                            NATs, if any.
                          type: string
                      required:
                      - ip
                      type: object
                    type: array
                  lockedPresetID:
                    description: |-
                      LockedPresetID is the upstream tier id, mirrored from the GET by
                      Observe (never Create-only — Create-set status is wiped by the
                      runtime's critical-annotation refresh). Drives tier-drift detection.
                    format: int64
                    type: integer
                  networks:
                    description: |-
                      Networks mirrors the dashboard's per-network table (SC-004: NAT /
                      gateway / DHCP answerable from status alone).
                    items:
                      description: RouterNetworkStatus mirrors one attached network
                        as the dashboard shows it.
                      properties:
                        dhcpEnabled:
                          description: DHCPEnabled reports the upstream DHCP state.
                          type: boolean
                        gateway:
                          description: Gateway is the router's address inside the
                            network.
                          type: string
                        id:
                          description: ID is the upstream network id.
                          type: string
                        name:
                          description: Name is the upstream network name.
                          type: string
                        natIP:
                          description: NATIP is the public address NATing this network;
                            nil = NAT off.
                          type: string
                        reservedIPs:
                          description: ReservedIPs are the addresses reserved in the
                            network's subnet.
                          items:
                            type: string
                          type: array
                      required:
                      - id
                      type: object
                    type: array
                  parentServices:
                    description: |-
                      ParentServices lists upstream services bound to this router. A
                      non-empty list blocks deletion (FR-012).
                    items:
                      description: |-
                        RouterParentService is an upstream service bound to this router (e.g. a
                        Kubernetes cluster running private nodes through it).
                      properties:
                        id:
                          description: ID is the upstream service id.
                          type: string
                        type:
                          description: Type is the upstream service type (e.g. "k8s").
                          type: string
                      required:
                      - id
                      - type
                      type: object
                    type: array
                  resolvedProjectID:
                    description: ResolvedProjectID is the project the router landed
                      in.
                    format: int64
                    type: integer
                  state:
                    description: State is the raw upstream status (starting, started,
                      failed, …).
                    type: string
                  upstreamID:
                    description: UpstreamID is the router UUID (also the external-name).
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
