    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ContainerRegistryRepository represents a single repository inside a
          ContainerRegistry. Repositories are created implicitly by `docker push`,
          not by this resource. The Timeweb API exposes only a list-of-repositories
          endpoint (no per-repository CRUD), so this MR is **observe-only** at the
          API level: applying the manifest gives operators a Kubernetes-native view
          of upstream repositories; `kubectl delete` removes the CR but does NOT
          touch the upstream repository (use `docker rmi` or the Timeweb dashboard
          for image cleanup).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ContainerRegistryRepositorySpec is the desired state.
            properties:
              forProvider:
                description: ContainerRegistryRepositoryParameters are the operator-settable
                  fields.
                properties:
                  name:
                    description: |-
                      Name is the repository name within the parent registry (e.g.
                      "mygroup/myimage"). Immutable — repositories cannot be renamed via the
                      Timeweb API. Created implicitly by `docker push`.
                    type: string
                  registryRef:
                    description: RegistryRef names the parent ContainerRegistry (same
                      namespace).
                    properties:
                      name:
                        description: Name of the parent ContainerRegistry.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - name
                - registryRef
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
