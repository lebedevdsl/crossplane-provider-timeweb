                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: ContainerRegistryRepositoryStatus is the observed state.
            properties:
              atProvider:
                description: ContainerRegistryRepositoryObservation is the controller-managed
                  view.
                properties:
                  tagCount:
                    description: TagCount is the number of tags (convenience for `kubectl
                      get`).
                    type: integer
                  tags:
                    description: Tags lists the image tags currently in the repository.
                    items:
                      description: ContainerRegistryRepositoryTag is a single tag
                        observed under the repository.
                      properties:
                        digest:
                          description: Digest is the OCI manifest digest.
                          type: string
                        sizeBytes:
                          description: SizeBytes is the manifest's total size in bytes.
                          type: integer
                        tag:
                          description: Tag is the image tag (e.g. "v1.0.0").
                          type: string
                      required:
                      - digest
                      - sizeBytes
                      - tag
                      type: object
                    type: array
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
