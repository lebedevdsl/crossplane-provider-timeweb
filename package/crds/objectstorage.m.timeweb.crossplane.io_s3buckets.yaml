---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: s3buckets.objectstorage.m.timeweb.crossplane.io
spec:
  group: objectstorage.m.timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - timeweb
    kind: S3Bucket
    listKind: S3BucketList
    plural: s3buckets
    singular: s3bucket
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .spec.forProvider.initialSizeGB
      name: SIZE-GB
      type: integer
    - jsonPath: .spec.forProvider.storageClass
      name: CLASS
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: ID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          S3Bucket is a Timeweb Cloud S3-compatible object-storage bucket.
          `name` is immutable; `type`, `description`, project assignment, and
          `presetName` are mutable. Sizing is preset-only — see
          `contracts/s3bucket-refactor-v1alpha1.md`.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: S3BucketSpec is the desired state.
            properties:
              forProvider:
                description: |-
                  S3BucketParameters are the operator-settable fields. Sizing is
                  preset-only: the Timeweb S3 surface exposes its volume tiers as
                  discrete presets (1 GB / 10 GB / 100 GB / 250 GB) in the dashboard,
                  and the upstream `/api/v1/storages/buckets` Create endpoint only
                  accepts a `preset_id` (the alternate `configuration{id,disk}` block
                  requires a service-internal configurator id that is not discoverable
                  via any public catalog endpoint — see spec.md §Clarifications
                  2026-05-31 catalog-endpoint reality check).
                properties:
                  description:
                    description: Description is a free-form comment. Mutable.
                    type: string
                  initialSizeGB:
                    description: |-
                      InitialSizeGB picks the bucket's tariff tier by disk size. The
                      controller maps `(initialSizeGB, location?, storageClass)` to one
                      upstream `preset_id` at reconcile time. Valid values match
                      Timeweb's published S3 storage tiers — bump this enum when the
                      upstream catalog grows.

                      Note: the generated Timeweb client (PresetsStorage.Disk and the
                      CreateBucket body's size/preset fields) uses *float32 for disk
                      quantities; the controller converts the resolved preset_id via
                      float32(presetID) at the call site (see s3bucket/external.go).
                    enum:
                    - 1
                    - 10
                    - 100
                    - 250
                    format: int64
                    type: integer
                  location:
                    description: |-
                      Location optionally narrows preset selection to one upstream
                      region (e.g. "ru-1"). Leave empty when the account has a single
                      region; set explicitly only if the cheapest-tier preset is
                      ambiguous across regions for your account.
                    type: string
                  name:
                    description: Name is the globally-unique bucket name. Immutable.
                    maxLength: 63
                    minLength: 3
                    pattern: ^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$
                    type: string
                  projectID:
                    description: ProjectID assigns the bucket to a Timeweb project.
                      Mutable.
                    type: integer
                  storageClass:
                    description: |-
                      StorageClass picks the upstream storage tier. `hot` is the
                      frequently-accessed default; `cold` is optimized for archives.
                    enum:
                    - hot
                    - cold
                    type: string
                  type:
                    description: Type is the bucket's access policy. Mutable post-create.
                    enum:
                    - private
                    - public
                    type: string
                required:
                - initialSizeGB
                - name
                - storageClass
                - type
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: S3BucketStatus is the observed state.
            properties:
              atProvider:
                description: S3BucketObservation is the controller-managed view of
                  the upstream bucket.
                properties:
                  diskStats:
                    description: DiskStats is the disk-usage stats.
                    properties:
                      isUnlimited:
                        description: IsUnlimited indicates an unmetered plan.
                        type: boolean
                      sizeKB:
                        description: SizeKB is total disk capacity in KB.
                        type: integer
                      usedKB:
                        description: UsedKB is the consumed disk in KB.
                        type: integer
                    type: object
                  hostname:
                    description: Hostname is the S3 endpoint URL.
                    type: string
                  id:
                    description: ID is the Timeweb bucket ID (also encoded as external-name).
                    type: integer
                  location:
                    description: Location is the geographic region.
                    type: string
                  lockedPresetID:
                    description: |-
                      LockedPresetID is the upstream preset ID locked at first Create —
                      snapshot of what the resolver chose for `presetName`. Survives
                      later resolver-cache rotations and dimension-registry edits.
                    format: int64
                    type: integer
                  movedInQuarantineAt:
                    description: |-
                      MovedInQuarantineAt is the RFC3339 timestamp the bucket entered
                      quarantine (nil when not quarantined).
                    type: string
                  objectAmount:
                    description: ObjectAmount is the file count.
                    type: integer
                  status:
                    description: Status is the upstream status string.
                    type: string
                  storageClass:
                    description: StorageClass is the upstream-reported tier (hot /
                      cold).
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
