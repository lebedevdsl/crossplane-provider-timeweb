                    pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$
                    type: string
                  projectID:
                    format: int64
                    type: integer
                  projectRef:
                    description: |-
                      ProjectRef / ProjectSelector / ProjectID assign the cluster to a
