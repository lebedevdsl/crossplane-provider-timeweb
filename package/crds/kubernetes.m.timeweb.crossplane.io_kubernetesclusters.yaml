                  managed control plane. See spec.md FR-004/FR-005 and
                  contracts/kubernetescluster-v1alpha1.md for the authoritative shape.
                properties:
                  availabilityZone:
                    description: |-
                      AvailabilityZone is the AZ the control plane lives in. Immutable
                      post-create. Codes are the upstream API values (NOT dashboard labels).
                      Sold-out zones are not hard-blocked beyond this set's evolution.
                    enum:
                    - spb-3
                    - msk-1
                    - ams-1
                    - fra-1
                    type: string
                  description:
