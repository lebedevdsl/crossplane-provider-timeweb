---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: firewalls.network.m.timeweb.crossplane.io
spec:
  group: network.m.timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - timeweb
    kind: Firewall
    listKind: FirewallList
    plural: firewalls
    singular: firewall
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .spec.forProvider.policy
      name: POLICY
      type: string
    - jsonPath: .status.atProvider.ruleCount
      name: RULES
      type: integer
    - jsonPath: .status.atProvider.attachedCount
      name: ATTACHED
      type: integer
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: ID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Firewall is a Timeweb Cloud firewall rule group: an allow-list (policy=DROP)
          of inbound/outbound rules attached to services (load balancers in v1). The
          firewall is the sole writer of its rules and attachments. See
          specs/013-firewall-api/contracts/timeweb-firewall-endpoints.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FirewallSpec is the desired state.
            properties:
              forProvider:
                description: |-
                  FirewallParameters is the operator-settable surface for a Timeweb firewall
                  rule group. See specs/013-firewall-api/contracts/firewall-v1alpha1.md.
                properties:
                  attachedServices:
                    description: |-
                      AttachedServices lists the services this group governs, by opaque
                      {serviceID, serviceType} reference (not a typed cross-MR ref). v1 targets
                      load balancers. The firewall group is the single writer of its
                      attachment set.
                    items:
                      description: |-
                        ServiceAttachment is an opaque reference to a Timeweb service the group
                        governs. v1 targets load balancers (type=balancer). A service is attached to
                        at most one group upstream (1:1 exclusivity).
                      properties:
                        serviceID:
                          description: |-
                            ServiceID is the upstream service id — e.g. a load-balancer id
                            ("k8s-lb_<uuid>") or a numeric server id rendered as a string.
                          type: string
                        serviceType:
                          default: balancer
                          description: ServiceType is the Timeweb resource type.
                          enum:
                          - server
                          - dbaas
                          - balancer
                          - app
                          type: string
                      required:
                      - serviceID
                      type: object
                    maxItems: 128
                    type: array
                  description:
                    description: Description is an optional free-form comment. Mutable.
                    type: string
                  name:
                    description: Name is the rule-group name shown in the dashboard.
                      Mutable.
                    maxLength: 250
                    minLength: 1
                    type: string
                  policy:
                    default: DROP
                    description: |-
                      Policy is the default action for traffic not matched by any rule:
                      DROP = default-deny allow-list (the dashboard's "Разрешающий"), ACCEPT =
                      default-allow. Set at create (the upstream takes it as a query param);
                      immutable thereafter — the group PATCH cannot change it.
                    enum:
                    - DROP
                    - ACCEPT
                    type: string
                  rules:
                    description: |-
                      Rules is the rule set (inline, single-writer). An empty list under
                      policy=DROP blocks all traffic for attached services. Each rule must be
                      unique by {direction,protocol,port,cidr}.

                      MaxItems bounds the array per the apiserver CEL cost budget
                      (project_cel_cost_budget_crd); raise it in a future version if needed.
                    items:
                      description: |-
                        FirewallRule is one inbound (ingress) or outbound (egress) rule in a group.
                        Under the default DROP policy each rule ALLOWS the described traffic; under
                        ACCEPT each rule blocks it. Rules are an order-insensitive set — duplicates
                        (same direction+protocol+port+cidr) are rejected at reconcile (FR-013).
                      properties:
                        cidr:
                          description: |-
                            CIDR is the source (ingress) or destination (egress) address or subnet,
                            IPv4 or IPv6. Use "0.0.0.0/0" for all addresses.
                          type: string
                        description:
                          description: Description is an optional per-rule comment.
                          type: string
                        direction:
                          description: Direction is the traffic direction.
                          enum:
                          - ingress
                          - egress
                          type: string
                        port:
                          description: |-
                            Port is a single port ("443") or a contiguous range ("8000-9000"), for
                            tcp/udp. MUST be omitted for icmp (it has no ports).
                          type: string
                        protocol:
                          description: Protocol is the network protocol.
                          enum:
                          - tcp
                          - udp
                          - icmp
                          type: string
                      required:
                      - cidr
                      - direction
                      - protocol
                      type: object
                    maxItems: 128
                    type: array
                required:
                - name
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: FirewallStatus is the observed state.
            properties:
              atProvider:
                description: FirewallObservation is the observed state of a firewall
                  rule group.
                properties:
                  attachedCount:
                    description: AttachedCount is the number of services currently
                      attached.
                    type: integer
                  attachedServices:
                    description: AttachedServices mirrors the services currently attached
                      upstream.
                    items:
                      description: |-
                        ServiceAttachment is an opaque reference to a Timeweb service the group
                        governs. v1 targets load balancers (type=balancer). A service is attached to
                        at most one group upstream (1:1 exclusivity).
                      properties:
                        serviceID:
                          description: |-
                            ServiceID is the upstream service id — e.g. a load-balancer id
                            ("k8s-lb_<uuid>") or a numeric server id rendered as a string.
                          type: string
                        serviceType:
                          default: balancer
                          description: ServiceType is the Timeweb resource type.
                          enum:
                          - server
                          - dbaas
                          - balancer
                          - app
                          type: string
                      required:
                      - serviceID
                      type: object
                    type: array
                  createdAt:
                    description: CreatedAt / UpdatedAt echo the upstream timestamps.
                    type: string
                  id:
                    description: ID is the upstream group UUID (also the external-name).
                    type: string
                  policy:
                    description: Policy is the observed default policy.
                    type: string
                  ruleCount:
                    description: RuleCount is the number of rules currently on the
                      group.
                    type: integer
                  rules:
                    description: Rules mirrors the upstream rule set.
                    items:
                      description: FirewallRuleStatus mirrors one upstream rule (incl.
                        its upstream id).
                      properties:
                        cidr:
                          type: string
                        description:
                          type: string
                        direction:
                          type: string
                        id:
                          type: string
                        port:
                          type: string
                        protocol:
                          type: string
                      required:
                      - cidr
                      - direction
                      - id
                      - protocol
                      type: object
                    type: array
                  updatedAt:
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
