---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: servers.compute.m.timeweb.crossplane.io
spec:
  group: compute.m.timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - timeweb
    kind: Server
    listKind: ServerList
    plural: servers
    singular: server
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .spec.forProvider.location
      name: LOCATION
      type: string
    - jsonPath: .spec.forProvider.presetName
      name: PRESET
      type: string
    - jsonPath: .status.atProvider.publicIP
      name: PUBLIC-IP
      type: string
    - jsonPath: .status.atProvider.state
      name: STATE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Server is a Timeweb cloud server (VM). Sized via the `presetName`
          resolver; OS via `os.image + os.version` resolver. See
          `contracts/server-v1alpha1.md` for the full operator surface.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ServerSpec is the desired state.
            properties:
              forProvider:
                description: |-
                  ServerParameters is the operator-settable surface. Required fields:
                  `name`, `presetName`, `location`, `os`. Everything else is optional.
                  See spec.md FR-003/FR-004 and contracts/server-v1alpha1.md for the
                  authoritative shape.
                properties:
                  availabilityZone:
                    description: |-
                      AvailabilityZone is an optional region sub-locator. Immutable
                      post-create.
                    type: string
                  cloudInit:
                    description: |-
                      CloudInit is a raw cloud-init payload (max 16 KiB).
                      Pass-through; the script runs once at first boot. Editing
                      post-create is permitted but a no-op for subsequent boots.
                    maxLength: 16384
                    type: string
                  comment:
                    description: Comment is a free-form description. Mutable post-create.
                    maxLength: 255
                    type: string
                  floatingIPIDs:
                    items:
                      type: string
                    type: array
                  floatingIPRefs:
                    description: |-
                      FloatingIPRefs / FloatingIPSelector / FloatingIPIDs bind one or
                      more Timeweb floating IPv4 addresses to this server. The Server
                      controller owns the bind/unbind upstream side-effects per the
                      2026-06-01 reversal clarification — single-owner per
                      Constitution §II. At most one of the trio MAY be set per
                      Server (CEL).
                    items:
                      description: A Reference to a named object.
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        policy:
                          description: Policies for referencing.
                          properties:
                            resolution:
                              default: Required
                              description: |-
                                Resolution specifies whether resolution of this reference is required.
                                The default is 'Required', which means the reconcile will fail if the
                                reference cannot be resolved. 'Optional' means this reference will be
                                a no-op if it cannot be resolved.
                              enum:
                              - Required
                              - Optional
                              type: string
                            resolve:
                              description: |-
                                Resolve specifies when this reference should be resolved. The default
                                is 'IfNotPresent', which will attempt to resolve the reference only when
                                the corresponding field is not present. Use 'Always' to resolve the
                                reference on every reconcile.
                              enum:
                              - Always
                              - IfNotPresent
                              type: string
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  floatingIPSelector:
                    description: A Selector selects an object.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                  hostname:
                    description: Hostname is the server's network hostname. Mutable
                      post-create.
                    type: string
                  location:
                    description: |-
                      Location is the region of the server. Mirrors the dashboard's
                      region picker. Frankfurt (fra-1) is included even though the
                      dashboard currently shows it as sold out — recovery if Timeweb
                      re-enables capacity. Immutable post-create.
                      Location codes are the upstream Timeweb API values (NOT the
                      dashboard's display labels — e.g. the dashboard shows "Москва · MSK-1"
                      but the API uses `ru-1`). Per the live `/api/v1/presets/servers`
                      probe + the openapi enums:
                        ru-1, ru-2, ru-3 — Russia regions
                        nl-1 — Netherlands (Amsterdam)
                        de-1 — Germany (Frankfurt; may be sold-out per the dashboard)
                        kz-1 — Kazakhstan (Almaty)
                        us-4 — United States (New York-area)
                        pl-1 — Poland (per openapi; not in current live preset response)
                    enum:
                    - ru-1
                    - ru-2
                    - ru-3
                    - nl-1
                    - de-1
                    - kz-1
                    - us-4
                    - pl-1
                    type: string
                  name:
                    description: Name as it appears in the Timeweb dashboard. Max
                      255 chars. Mutable.
                    maxLength: 255
                    minLength: 1
                    type: string
                  networkID:
                    type: string
                  networkRef:
                    description: |-
                      NetworkRef / NetworkSelector / NetworkID attach the server to a
                      private network (single network in v0.3). At most one MAY be set.
                      Immutable post-create.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  networkSelector:
                    description: A Selector selects an object.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                  os:
                    description: |-
                      OS pins the operating system installed at create time.
                      Immutable post-create.
                    properties:
                      image:
                        description: |-
                          Image is the OS family slug, lowercased (e.g. "ubuntu", "debian",
                          "centos", "windows", "almalinux"). Matched case-insensitively
                          against the upstream entry's `name` field.
                        pattern: ^[a-z0-9][a-z0-9-]*$
                        type: string
                      version:
                        description: |-
                          Version is the upstream version string exactly as listed by
                          `/api/v1/os/servers` (e.g. "24.04", "13", "2022", "10.0").
                        minLength: 1
                        type: string
                    required:
                    - image
                    - version
                    type: object
                  presetName:
                    description: |-
                      PresetName is the slug accepted by the in-controller catalog
                      resolver (`<description_short>-<location>`, e.g.
                      `premium-2-2-40-msk-1`). Resolved against `/api/v1/presets/servers`.
                      Immutable post-create — resize lands in a follow-up feature.
                    pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$
                    type: string
                  projectID:
                    format: int64
                    type: integer
                  projectRef:
                    description: |-
                      ProjectRef / ProjectSelector / ProjectID assign the server to a
                      Timeweb project. At most one MAY be set. All three unset → the
                      account's default project is used. Immutable post-create.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  projectSelector:
                    description: A Selector selects an object.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                  sshKeyIDs:
                    items:
                      format: int64
                      type: integer
                    type: array
                  sshKeyRefs:
                    description: |-
                      SSHKeyRefs / SSHKeySelector / SSHKeyIDs select SSH keys to
                      install at server-create time. Per-element mutually exclusive
                      semantics: an operator typically picks ONE of refs/selector/IDs.
                      Immutable post-create — Timeweb cloud servers do not support
                      changing the key list after provisioning.
                    items:
                      description: A Reference to a named object.
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        policy:
                          description: Policies for referencing.
                          properties:
                            resolution:
                              default: Required
                              description: |-
                                Resolution specifies whether resolution of this reference is required.
                                The default is 'Required', which means the reconcile will fail if the
                                reference cannot be resolved. 'Optional' means this reference will be
                                a no-op if it cannot be resolved.
                              enum:
                              - Required
                              - Optional
                              type: string
                            resolve:
                              description: |-
                                Resolve specifies when this reference should be resolved. The default
                                is 'IfNotPresent', which will attempt to resolve the reference only when
                                the corresponding field is not present. Use 'Always' to resolve the
                                reference on every reconcile.
                              enum:
                              - Always
                              - IfNotPresent
                              type: string
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  sshKeySelector:
                    description: A Selector selects an object.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                required:
                - location
                - name
                - os
                - presetName
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: ServerStatus is the observed state.
            properties:
              atProvider:
                description: ServerObservation is the observed state. Populated by
                  Observe.
                properties:
                  boundFloatingIPs:
                    description: |-
                      BoundFloatingIPs lists the upstream IDs (strings) of floating IPs
                      currently bound to this server, confirmed via each IP's upstream
                      bound_to.resource_id. The Server controller owns this binding
                      (bind/unbind) per the 2026-06-01 reversal — single-owner. Upstream
                      floating-IP IDs are strings (FloatingIpId), so this is []string.
                    items:
                      type: string
                    type: array
                  lockedOSID:
                    description: |-
                      LockedOSID is the upstream `os_id` resolved at first successful
                      Create.
                    format: int64
                    type: integer
                  lockedPresetID:
                    description: |-
                      LockedPresetID is the upstream `preset_id` resolved at first
                      successful Create. Drift here is treated as terminal (FR-009).
                    format: int64
                    type: integer
                  privateIP:
                    description: |-
                      PrivateIP is the IP inside the attached private network's CIDR.
                      Empty when no network is attached.
                    type: string
                  publicIP:
                    description: PublicIP is the assigned IPv4 public address.
                    type: string
                  publicIPv6:
                    description: PublicIPv6 is the assigned IPv6 public address (free
                      per dashboard).
                    type: string
                  resolvedNetworkID:
                    description: |-
                      ResolvedNetworkID is the upstream `vpc_id` the server is attached
                      to (resolved from networkRef/Selector/ID).
                    type: string
                  resolvedProjectID:
                    description: ResolvedProjectID is the upstream `project_id` the
                      server lives in.
                    format: int64
                    type: integer
                  resolvedSSHKeyIDs:
                    description: |-
                      ResolvedSSHKeyIDs lists the upstream SSH-key IDs installed at
                      create time.
                    items:
                      format: int64
                      type: integer
                    type: array
                  state:
                    description: |-
                      State is the upstream server state — one of: "installing",
                      "starting", "on", "off", "rebooting", "transfer", "removing".
                      Maps to the Ready condition per FR-014.
                    type: string
                  upstreamID:
                    description: UpstreamID is the Timeweb `server_id`.
                    format: int64
                    type: integer
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: at most one of networkRef, networkSelector, networkID may be set
          rule: (has(self.spec.forProvider.networkRef)?1:0) + (has(self.spec.forProvider.networkSelector)?1:0)
            + (has(self.spec.forProvider.networkID)?1:0) <= 1
        - message: at most one of projectRef, projectSelector, projectID may be set
          rule: (has(self.spec.forProvider.projectRef)?1:0) + (has(self.spec.forProvider.projectSelector)?1:0)
            + (has(self.spec.forProvider.projectID)?1:0) <= 1
        - message: at most one of floatingIPRefs, floatingIPSelector, floatingIPIDs
            may be set
          rule: (has(self.spec.forProvider.floatingIPRefs)?1:0) + (has(self.spec.forProvider.floatingIPSelector)?1:0)
            + (has(self.spec.forProvider.floatingIPIDs)?1:0) <= 1
    served: true
    storage: true
    subresources:
      status: {}
