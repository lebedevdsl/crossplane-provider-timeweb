---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: providerconfigs.timeweb.crossplane.io
spec:
  group: timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - provider
    - timeweb
    kind: ProviderConfig
    listKind: ProviderConfigList
    plural: providerconfigs
    singular: providerconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.credentials.secretRef.name
      name: SECRET-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ProviderConfig is the namespaced configuration for the Timeweb Crossplane
          provider. Managed resources in the same namespace reference one via
          `spec.providerConfigRef: { kind: ProviderConfig, name: <pc> }`. For the
          cluster-scoped alternative see `ClusterProviderConfig`. There is no
          silent fallback between the two — `spec.providerConfigRef.kind` is the
          sole switch (per 2026-05-31 upstream-alignment clarification).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ProviderConfigSpec configures the Timeweb Cloud connection used by every
              managed resource that references this ProviderConfig. The exact same
              `ProviderConfigSpec` type backs both the namespaced `ProviderConfig` and
              the cluster-scoped `ClusterProviderConfig` per the 2026-05-31
              upstream-alignment clarification — matches the single-Spec shape used by
              `crossplane-contrib/provider-kubernetes` /
              `crossplane-contrib/provider-helm` / `crossplane-contrib/provider-upjet-azure`.
              See `contracts/providerconfig-namespaced-v1alpha1.md`.
            properties:
              credentials:
                description: |-
                  Credentials selects the source of the Timeweb API token. Only the
                  `Secret` source is supported in v0.1 (FR-003).
                properties:
                  secretRef:
                    description: SecretRef points at a Secret holding the Timeweb
                      API token.
                    properties:
                      key:
                        description: Key within the Secret that holds the Timeweb
                          API token.
                        type: string
                      name:
                        description: Name of the Secret holding the Timeweb API token.
                        type: string
                      namespace:
                        description: |-
                          Namespace of the Secret. Optional on `ProviderConfig` (defaults to
                          the PC's own namespace at controller-resolve time). Required on
                          `ClusterProviderConfig`.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  source:
                    description: Source of the Timeweb API token. Only `Secret` is
                      supported in v0.1.
                    enum:
                    - Secret
                    type: string
                required:
                - source
                type: object
            required:
            - credentials
            type: object
          status:
            description: ProviderConfigStatus exposes the ProviderConfig's observed
              state.
            properties:
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              users:
                description: Users of this provider configuration.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
