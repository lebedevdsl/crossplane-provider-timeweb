            properties:
              atProvider:
                description: S3UserObservation is the controller-managed view of the
                  upstream IAM user.
                properties:
                  accessKeyID:
                    description: |-
                      AccessKeyID is the user's non-secret access key id. The secret key
                      lives only in the connection Secret, never in status.
                    type: string
                  id:
                    description: ID is the upstream IAM user UUID (also encoded as
                      external-name).
                    type: string
                  policyHash:
                    description: PolicyHash is a stable hash of the rendered desired
                      policy (drift signal).
                    type: string
                  resolvedBuckets:
                    description: ResolvedBuckets mirrors the resolved (bucket name,
                      level) grants applied.
                    items:
                      description: ResolvedGrant is one applied (bucket name, level)
                        grant, mirrored to status.
                      properties:
                        accessLevel:
                          description: AccessLevel is the applied access level.
                          type: string
                        bucketName:
                          description: BucketName is the resolved bucket name.
                          type: string
                      required:
                      - accessLevel
                      - bucketName
                      type: object
                    type: array
                  status:
                    description: Status is the upstream user status (e.g. "active").
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
