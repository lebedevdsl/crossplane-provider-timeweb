                  S3UserParameters are the operator-settable fields for a scoped object-storage
                  IAM user. The controller renders one merged inline policy (`iam-user-policy`)
                  from BucketAccess — the same convention the Timeweb panel reads/writes.
                properties:
                  bucketAccess:
                    description: |-
                      BucketAccess lists the buckets this user may reach and at what level.
                      Each bucket may appear at most once (duplicates are rejected). An empty
                      list yields an identity with only the account-wide bucket-listing
                      permission ("revoked from every bucket").
                    items:
                      description: |-
                        BucketGrant binds one bucket to one access level. Exactly one of BucketRef /
                        BucketName must be set.
                      properties:
                        accessLevel:
                          description: AccessLevel is the grant level for this bucket.
                          enum:
                          - read
                          - read-write
                          - admin
                          type: string
                        bucketName:
                          description: BucketName names the bucket directly (for buckets
                            not managed here).
                          type: string
                        bucketRef:
                          description: BucketRef references an S3Bucket in the same
                            namespace.
                          properties:
                            name:
                              description: Name of the referenced object.
                              type: string
                            policy:
                              description: Policies for referencing.
                              properties:
                                resolution:
                                  default: Required
                                  description: |-
                                    Resolution specifies whether resolution of this reference is required.
                                    The default is 'Required', which means the reconcile will fail if the
                                    reference cannot be resolved. 'Optional' means this reference will be
                                    a no-op if it cannot be resolved.
                                  enum:
                                  - Required
                                  - Optional
                                  type: string
                                resolve:
                                  description: |-
                                    Resolve specifies when this reference should be resolved. The default
                                    is 'IfNotPresent', which will attempt to resolve the reference only when
                                    the corresponding field is not present. Use 'Always' to resolve the
                                    reference on every reconcile.
                                  enum:
                                  - Always
                                  - IfNotPresent
                                  type: string
                              type: object
                          required:
                          - name
                          type: object
                      required:
                      - accessLevel
                      type: object
                    maxItems: 64
                    type: array
                  name:
