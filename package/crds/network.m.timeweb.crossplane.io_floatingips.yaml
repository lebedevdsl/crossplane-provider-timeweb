---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: floatingips.network.m.timeweb.crossplane.io
spec:
  group: network.m.timeweb.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - timeweb
    kind: FloatingIP
    listKind: FloatingIPList
    plural: floatingips
    singular: floatingip
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .spec.forProvider.location
      name: LOCATION
      type: string
    - jsonPath: .status.atProvider.ip
      name: IP
      type: string
    - jsonPath: .status.atProvider.observedBoundSummary
      name: BOUND-TO
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: ID
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FloatingIP is a Timeweb floating IPv4 address — pure allocation. The
          consuming MR (Server today; Balancer/Database/Network in future
          features) drives binding via its own `floatingIPRefs` trio. See
          contracts/floatingip-v1alpha1.md and the 2026-06-01 FloatingIP
          reversal clarification in spec.md for the single-owner reasoning.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FloatingIPSpec is the desired state.
            properties:
              forProvider:
                description: |-
                  FloatingIPParameters is the operator-settable surface for a Timeweb
                  floating IPv4. Per the 2026-06-01 FloatingIP reversal clarification
                  (spec.md), this MR is **pure allocation** — it owns only Create
                  (`POST /api/v1/floating-ips`) and Delete (`DELETE /api/v1/floating-ips/{id}`).
                  Binding to a consumer (Server today; Balancer/Database/Network in
                  future features) is driven by the consuming MR's `floatingIPRefs`
                  trio, NOT by this MR. The Server controller is the single-owner of
                  bind/unbind side-effects per Constitution §II.
                properties:
                  availabilityZone:
                    description: |-
                      AvailabilityZone is the upstream availability-zone string.
                      Required by the upstream API; the controller derives a per-
                      location default when this is omitted on spec. Immutable post-
                      create.
                    type: string
                  comment:
                    description: Comment is a free-form description. Mutable post-create.
                    type: string
                  isDDoSGuard:
                    default: false
                    description: |-
                      IsDDoSGuard toggles upstream DDoS protection for this floating
                      IP. Defaults to false (no protection) to match the common case
                      where DDoS guard is bought separately. Immutable post-create.
                    type: boolean
                  location:
                    description: |-
                      Location is the region the IP is allocated in. Same enum as
                      Server / Network. Immutable post-create.
                      Location codes are upstream Timeweb API values — see
                      `apis/compute/v1alpha1/server_types.go` for the full mapping.
                    enum:
                    - ru-1
                    - ru-2
                    - ru-3
                    - nl-1
                    - de-1
                    - kz-1
                    - us-4
                    - pl-1
                    type: string
                    x-kubernetes-validations:
                    - message: location is immutable
                      rule: self == oldSelf
                required:
                - isDDoSGuard
                - location
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: FloatingIPStatus is the observed state.
            properties:
              atProvider:
                description: |-
                  FloatingIPObservation is the observed state. ObservedBoundTo is
                  populated from the upstream `bound_to` field for diagnostics
                  (`kubectl describe`); it is NOT authoritative for reconciliation
                  — the consuming MR's status carries the authoritative binding
                  state.
                properties:
                  ip:
                    description: IP is the assigned IPv4 address.
                    type: string
                  observedBoundSummary:
                    description: |-
                      ObservedBoundSummary is a computed display field combining the
                      upstream resourceType + id/uuid into a single string
                      (e.g. "server/42" or "router/abc-uuid"). Populated by Observe;
                      nil when the IP is unbound. Drives the BOUND-TO printcolumn
                      without requiring a multi-path JSONPath expression.
                    type: string
                  observedBoundTo:
                    description: |-
                      ObservedBoundTo reflects the upstream `bound_to` field
                      verbatim — purely diagnostic. The consuming MR (e.g. Server)
                      drives binding via its own `floatingIPRefs` trio; this status
                      just mirrors what upstream reports.
                    properties:
                      resourceID:
                        description: ResourceID is the upstream ID of the resource
                          this IP is bound to.
                        format: int64
                        type: integer
                      resourceType:
                        description: 'ResourceType is one of: "server", "balancer",
                          "database", "network", "router".'
                        type: string
                      resourceUUID:
                        description: |-
                          ResourceUUID is the string id for UUID-keyed bindings, e.g. routers;
                          the int64 ResourceID can't hold these.
                        type: string
                    type: object
                  upstreamID:
                    description: UpstreamID is the Timeweb floating-IP ID.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
