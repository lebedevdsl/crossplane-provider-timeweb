# golangci-lint configuration (v2 schema) for crossplane-provider-timeweb.
# Standard ecosystem tooling; no project-specific custom rules.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    rules:
      # Generated code — do not lint.
      - path: internal/clients/timeweb/generated/.*
        linters:
          - bodyclose
          - contextcheck
          - errcheck
          - errorlint
          - gocritic
          - gosec
          - govet
          - ineffassign
          - misspell
          - revive
          - staticcheck
          - unconvert
          - unused
      - path: apis/.*/zz_generated.*
        linters:
          - bodyclose
          - contextcheck
          - errcheck
          - errorlint
          - gocritic
          - gosec
          - govet
          - ineffassign
          - misspell
          - revive
          - staticcheck
          - unconvert
          - unused
      - path: internal/clients/timeweb/fake\.go
        linters:
          - bodyclose
          - contextcheck
          - errcheck
          - errorlint
          - gocritic
          - gosec
          - govet
          - ineffassign
          - misspell
          - revive
          - staticcheck
          - unconvert
          - unused
      # Test files: relax a few checks that add noise without value in tests.
      - path: _test\.go
        text: "dot-imports"
        linters:
          - revive
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - bodyclose
      # Crossplane interface forwarders on every MR type are trivial
      # accessors (GetCondition, SetConditions, GetProviderConfigReference,
      # …) required by `crossplane-runtime`'s ModernManaged contract. The
      # method signatures and the receiver type names already describe
      # what they do; adding boilerplate godoc to each adds noise without
      # adding meaning. Exempt these files from the "exported" rule.
      - path: apis/.*/managed\.go
        text: "exported"
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lebedevdsl/crossplane-provider-timeweb
