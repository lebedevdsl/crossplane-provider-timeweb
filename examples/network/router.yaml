# A Router with one NAT-enabled private network (feature 006).
#
# The tier slug (presetName) is resolved against the live per-region catalog.
# Feature 007 accepts both the bare short form (e.g. `router-1x1-1gb`) and the
# long <short>-<location> form (e.g. `router-1x1-1gb-ru-3`). Both resolve the
# same when a location / availabilityZone is declared.
# 2-node slugs (router-2x...) are the HA tiers.
# The availabilityZone must match the tier's region — a mismatch is rejected
# before anything is created.
#
# NAT is declared per attachment by referencing a FloatingIP: the reference's
# presence IS the NAT switch (one address serves one network), and the Router
# never orders addresses itself.
apiVersion: network.m.timeweb.crossplane.io/v1alpha1
kind: Network
metadata:
  name: app-net
  namespace: default
spec:
  providerConfigRef:
    kind: ProviderConfig
    name: default
  forProvider:
    name: app-net
    subnetCIDR: 10.50.0.0/24
    location: ru-3
---
apiVersion: network.m.timeweb.crossplane.io/v1alpha1
kind: FloatingIP
metadata:
  name: egress-ip
  namespace: default
spec:
  providerConfigRef:
    kind: ProviderConfig
    name: default
  forProvider:
    location: ru-3
    availabilityZone: msk-1
    isDDoSGuard: false
---
apiVersion: network.m.timeweb.crossplane.io/v1alpha1
kind: Router
metadata:
  name: edge
  namespace: default
spec:
  providerConfigRef:
    kind: ProviderConfig
    name: default
  forProvider:
    name: edge
    location: ru-3
    availabilityZone: msk-1
    # Bare form (feature 007): resolver scopes to availabilityZone → location.
    # Long form `router-1x1-1gb-ru-3` also still works (back-compat).
    presetName: router-1x1-1gb
    networks:
      - networkRef:
          name: app-net
        natFloatingIP:
          ref:
            name: egress-ip
        dhcp: true
