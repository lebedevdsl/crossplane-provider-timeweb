# Example ContainerRegistry managed resource for the Timeweb Crossplane provider.
#
# The controller publishes a `kubernetes.io/dockerconfigjson` Secret that
# workloads can reference directly as `imagePullSecrets[].name`. The Secret
# also carries raw `endpoint`/`username`/`password` keys for non-K8s consumers.
#
# Sizing: set `initialSizeGB` to one of 5, 10, 25, 50, 75, 100.
# The controller maps the size (+ optional location) to the upstream preset_id.
#
# IMMUTABLE FIELDS: name, initialSizeGB (cannot change the tier; delete + recreate).
# Mutable: description, projectID.
#
# See docs/presets.md for the full initialSizeGB field reference.
# See docs/resources/containerregistry.md for lifecycle and conditions.
---
apiVersion: kubernetes.m.timeweb.crossplane.io/v1alpha1
kind: ContainerRegistry
metadata:
  name: demo-prod
  namespace: timeweb-prod
spec:
  forProvider:
    # IMMUTABLE — 3-48 chars, lowercase alphanumeric + hyphen.
    name: demo-prod
    description: "Production registry for example.com images"
    # Pick the tier by disk size. Valid values: 5, 10, 25, 50, 75, 100 (GB).
    # IMMUTABLE post-create — changing tiers requires delete + recreate.
    initialSizeGB: 5
    # Optional: narrow preset resolution when the account has multiple regions.
    # location: ru-1
  writeConnectionSecretToRef:
    name: demo-prod-pull
    # namespace defaults to the MR's namespace if omitted
  providerConfigRef:
    kind: ProviderConfig
    name: default
